<!DOCTYPE html>
<html>
<head>
    <title>パスワード変更</title>
</head>
<body>

<h1>パスワード変更</h1>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<form method="post">

    <input
        type="password"
        name="current_password"
        placeholder="現在のパスワード"
    >

    <br><br>

    <input
        type="password"
        name="new_password"
        placeholder="新しいパスワード"
    >

    <br><br>

    <button type="submit">
        変更
    </button>

</form>

<br>

<a href="/">戻る</a>

</body>
</html>
