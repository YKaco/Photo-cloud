<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Photo Cloud</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:20px;
        }

        h1{
            text-align:center;
        }

        .upload-box{
            text-align:center;
            margin-bottom:30px;
        }

        .gallery{
            display:grid;
            grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
            gap:15px;
        }

        .photo{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
            padding:10px;
        }

        .photo img{
            width:100%;
            height:250px;
            object-fit:cover;
        }
    </style>
</head>

<body>

<h1>📸 Photo Cloud</h1>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<div class="upload-box">
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="photo">
        <button type="submit">アップロード</button>
    </form>
</div>

<div class="gallery">

    {% for img, time in images %}

    <div class="photo">

        <img src="{{ url_for('uploaded_file', filename=img) }}">

        <p>{{ time }}</p>

        <form action="/delete/{{ img }}" method="post">
            <button type="submit">削除</button>
        </form>

    </div>

    {% endfor %}

</div>

</body>
</html>
