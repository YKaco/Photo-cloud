<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h1>ユーザー登録</h1>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">

    <input type="text" name="username" placeholder="ID">
    <br><br>

    <input type="password" name="password" placeholder="Password">
    <br><br>

    <button type="submit">登録</button>

</form>

<br><br>
<a href="/">ログイン画面へ戻る</a>

</body>
</html>
